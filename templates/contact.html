<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Clement BOUVERET</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background-color: #020508;
            overflow: hidden;
        }

        /* Full-screen Fluid Background */
        #fluid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism Contact Card */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            width: 85%;
            max-width: 850px;
            display: flex;
            gap: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            color: white;
        }

        .left { flex: 1; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 20px; }
        .right { flex: 1.2; }

        h1 { font-size: 2.2rem; color: #00d2ff; margin-bottom: 10px; }
        p { line-height: 1.6; color: #d1d1d1; }
        
        .safran-text { color: #00d2ff; font-weight: bold; }

        .hobby-container { margin-top: 25px; }
        .hobby-tag {
            display: inline-block;
            background: rgba(0, 210, 255, 0.15);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin: 4px;
            border: 1px solid rgba(0, 210, 255, 0.4);
        }

        /* Input Styling */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        input:focus { border-color: #00d2ff; }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00d2ff;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }

        @media (max-width: 700px) {
            .card { flex-direction: column; }
            .left { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        }
    </style>
</head>
<body>

    <canvas id="fluid"></canvas>

    <div class="card">
        <div class="left">
            <h1>Clement BOUVERET</h1>
            <p>Student and Apprentice at <span class="safran-text">Safran Aircraft Engines</span>.</p>
            
            <div class="hobby-container">
                <div class="hobby-tag">🎮 Video Games</div>
                <div class="hobby-tag">🇬🇧 English</div>
                <div class="hobby-tag">🏋️‍♂️ Weightlifting</div>
            </div>
        </div>

        <div class="right">
            <form onsubmit="event.preventDefault(); alert('Sent!');">
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <textarea rows="4" placeholder="Your Message..."></textarea>
                <button type="submit">SUBMIT MESSAGE</button>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fluid');
        const ctx = canvas.getContext('2d');
        let w, h;
        let tick = 0;
        const mouse = { x: undefined, y: undefined };

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        function drawWave(color, amplitude, frequency, speed, yOffset) {
            ctx.beginPath();
            ctx.moveTo(0, h);
            
            for (let x = 0; x <= w; x += 2) {
                // Wave logic
                let waveY = Math.sin(x * frequency + tick * speed) * amplitude;
                
                // Mouse distortion logic
                let dist = Math.abs(x - mouse.x);
                if (dist < 200 && mouse.x !== undefined) {
                    let mOffset = (200 - dist) / 200;
                    // Check proximity to mouse Y to pull the wave
                    let yDist = (yOffset + waveY) - mouse.y;
                    waveY -= yDist * mOffset * 0.5;
                }

                ctx.lineTo(x, yOffset + waveY);
            }

            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function animate() {
            tick++;
            ctx.clearRect(0, 0, w, h);
            
            // Layering multiple "water" fills
            drawWave('rgba(0, 50, 100, 0.3)', 50, 0.002, 0.02, h * 0.5);
            drawWave('rgba(0, 100, 180, 0.3)', 40, 0.003, 0.03, h * 0.55);
            drawWave('rgba(0, 150, 255, 0.2)', 30, 0.004, 0.015, h * 0.6);
            drawWave('rgba(0, 210, 255, 0.4)', 60, 0.0015, 0.01, h * 0.7);

            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('resize', init);
        
        init();
        animate();
    </script>
</body>
</html>

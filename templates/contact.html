<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Clement BOUVERET</title>
    <style>
        /* Base Styling & Animated Gradient */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Keeps particles contained */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1e3c72);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Canvas Layer for Particles */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Behind the form */
            pointer-events: none;
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 2; /* Above the particles */
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            width: 85%;
            max-width: 900px;
            display: flex;
            flex-wrap: wrap;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            color: white;
        }

        .info-section { flex: 1; min-width: 300px; padding: 20px; }
        .form-section { flex: 1; min-width: 300px; padding: 20px; }

        h1 { margin-bottom: 5px; color: #00d2ff; font-size: 2.2rem; }
        h3 { color: #ccc; font-weight: 300; margin-bottom: 20px; }
        
        .tag {
            display: inline-block;
            background: rgba(0, 210, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 5px 3px;
            border: 1px solid rgba(0, 210, 255, 0.3);
        }

        /* Form Styling */
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #00d2ff; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: #00d2ff; background: rgba(255, 255, 255, 0.1); }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }

        .work-highlight { color: #00d2ff; font-weight: 600; }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <div class="info-section">
            <h1>Clement BOUVERET</h1>
            <h3>Student @ Safran Aircraft Engines</h3>
            <p>Developing future aerospace solutions while pursuing my studies.</p>
            
            <div style="margin-top: 30px;">
                <p><strong>Hobbies & Interests</strong></p>
                <span class="tag">🎮 Video Games</span>
                <span class="tag">🇬🇧 English Fluency</span>
                <span class="tag">🏋️‍♂️ Weightlifting</span>
            </div>
        </div>

        <div class="form-section">
            <form onsubmit="event.preventDefault(); alert('Message simulation successful!');">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="john@example.com" required>
                </div>
                <div class="input-group">
                    <label>Message</label>
                    <textarea rows="4" placeholder="How can I help you?"></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5, // Slow horizontal drift
                    vy: (Math.random() - 0.5) * 0.5, // Slow vertical drift
                    size: Math.random() * 2 + 1,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                // Wrap around edges
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>

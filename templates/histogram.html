<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Day Temperature Distribution</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(drawHistogram);

        async function drawHistogram() {
            try {
                const response = await fetch('/paris');
                const jsonData = await response.json();

                const data = new google.visualization.DataTable();
                // We only need the temperature for the histogram's distribution
                data.addColumn('string', 'Time'); 
                data.addColumn('number', 'Temperature (°C)');

                const chartData = jsonData.map(item => [
                    item.datetime, 
                    item.temperature_c
                ]);

                data.addRows(chartData);

                const options = {
                    title: 'Temperature Distribution in Paris: Next 7 Days',
                    legend: { position: 'none' },
                    colors: ['#4285F4'], // Google Blue
                    histogram: { 
                        bucketSize: 1, // Groups temperatures by 1°C increments
                        hideBucketItems: true 
                    },
                    vAxis: { 
                        title: 'Number of Occurrences (Hours)' 
                    },
                    hAxis: { 
                        title: 'Temperature (°C)',
                        gridlines: { count: 10 }
                    },
                    chartArea: { width: '80%', height: '70%' }
                };

                const chart = new google.visualization.Histogram(document.getElementById('chart_div'));
                chart.draw(data, options);
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('chart_div').innerHTML = "Error loading 7-day data.";
            }
        }
    </script>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f4f7f6;">
    <h1 style="color: #333;">Paris 7-Day Forecast Analysis</h1>
    <p style="color: #666;">This histogram shows how many hours each temperature range is expected to last over the next week.</p>
    
    <div id="chart_div" style="width: 100%; height: 500px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white;"></div>

    <div style="margin-top: 20px;">
        <a href="/rapport" style="text-decoration: none; color: #4285F4;">View Line Chart</a> | 
        <a href="/" style="text-decoration: none; color: #4285F4;">Home</a>
    </div>
</body>
</html>

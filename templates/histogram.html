<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Max Temperatures</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(drawChart);

        async function drawChart() {
            try {
                const response = await fetch('/paris');
                const jsonData = await response.json();

                // 1. Group the 168 hours of data into 7 days and find the MAX for each
                const dailyMaxMap = {};
                jsonData.forEach(item => {
                    const day = item.datetime.split('T')[0]; // Extract YYYY-MM-DD
                    if (!dailyMaxMap[day] || item.temperature_c > dailyMaxMap[day]) {
                        dailyMaxMap[day] = item.temperature_c;
                    }
                });

                // 2. Prepare the Data Table
                const data = new google.visualization.DataTable();
                data.addColumn('string', 'Day');             // Horizontal Axis
                data.addColumn('number', 'Max Temperature'); // Vertical Axis
                data.addColumn({type: 'string', role: 'tooltip'}); // Custom Etiquette

                // 3. Add the processed rows
                const rows = Object.keys(dailyMaxMap).map(day => [
                    day, 
                    dailyMaxMap[day], 
                    `Temperature: ${dailyMaxMap[day]} [C]`
                ]);
                data.addRows(rows);

                // 4. Configure the ColumnChart
                const options = {
                    title: 'Maximum Temperature per Day (Paris - 7 Days)',
                    hAxis: { title: 'Day' },
                    vAxis: { 
                        title: 'Temperature [C]',
                        gridlines: { count: 5 } 
                    },
                    legend: { position: 'none' },
                    colors: ['#e67e22'], // High-temp orange
                    chartArea: { width: '80%', height: '70%' }
                };

                const chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
                chart.draw(data, options);

            } catch (error) {
                console.error("Error updating chart:", error);
                document.getElementById('chart_div').innerText = "Failed to load temperature data.";
            }
        }
    </script>
</head>
<body style="font-family: Arial, sans-serif; margin: 30px; background-color: #f9f9f9;">
    <h2>Analyse Quotidienne : Maxima sur 7 jours</h2>
    <div id="chart_div" style="width: 100%; height: 500px; background: white; border: 1px solid #ddd; padding: 15px;">
        Chargement des données...
    </div>
    <p><a href="/">Retour à l'accueil</a></p>
</body>
</html>
